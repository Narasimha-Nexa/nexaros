name: Deploy Marketing Website

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing-web/**'
      - 'netlify.toml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build marketing website
        run: pnpm --filter @nexaros/marketing-web run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.BACKEND_URL }}/api
          NEXT_PUBLIC_SITE_URL: https://nexaros.com

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: apps/marketing-web/.next
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
