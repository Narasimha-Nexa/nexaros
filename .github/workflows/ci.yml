name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build backend
        run: pnpm --filter @nexaros/backend run build
      - name: Lint backend
        run: pnpm --filter @nexaros/backend run lint
      - name: Test backend
        run: pnpm --filter @nexaros/backend run test
        env:
          DATABASE_URL: postgresql://nexaros:nexaros_dev@localhost:5432/nexaros?schema=public
          JWT_SECRET: test-secret-for-ci-only-64-characters-long!!
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-only-64-chars!!
          ADMIN_JWT_SECRET: test-admin-secret-for-ci-only-64-characters-long!!
      - name: Build Docker image
        run: docker build -f docker/Dockerfile.backend -t nexaros-backend:ci .

  marketing:
    name: Marketing Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint marketing web
        run: pnpm --filter @nexaros/marketing-web run lint
      - name: Build marketing web
        run: pnpm --filter @nexaros/marketing-web run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3002

  admin:
    name: Admin Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint admin portal
        run: pnpm --filter @nexaros/admin-portal run lint
      - name: Build admin portal
        run: pnpm --filter @nexaros/admin-portal run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, marketing, admin]
    steps:
      - uses: actions/checkout@v4
      - name: Build all Docker images
        run: |
          docker build -f docker/Dockerfile.backend -t nexaros-backend:ci .
          docker build -f docker/Dockerfile.marketing -t nexaros-marketing:ci .
          docker build -f docker/Dockerfile.customer -t nexaros-customer:ci .
          docker build -f docker/Dockerfile.admin -t nexaros-admin:ci .
