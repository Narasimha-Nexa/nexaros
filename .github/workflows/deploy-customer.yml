name: Deploy Customer Website

on:
  push:
    branches: [main]
    paths:
      - 'apps/customer-web/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build customer website
        run: pnpm --filter @nexaros/customer-web run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.BACKEND_URL }}/api

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: apps/customer-web/.next
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy customer-web from GitHub Actions - ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_CUSTOMER_SITE_ID: ${{ secrets.NETLIFY_CUSTOMER_SITE_ID }}
