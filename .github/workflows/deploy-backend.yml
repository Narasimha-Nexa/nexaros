name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          service: nexaros-backend
          token: ${{ secrets.RAILWAY_TOKEN }}
