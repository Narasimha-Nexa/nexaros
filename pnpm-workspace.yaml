packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': set this to true or false
  esbuild: true
  msgpackr-extract: set this to true or false
  prisma: true
  sharp: true
  unrs-resolver: set this to true or false
minimumReleaseAgeExclude:
  - postcss@8.5.19
