version: '3.8'

networks:
  nexaros-network:
    driver: bridge

services:
  # ─── Infrastructure ───

  nexaros-postgres:
    image: postgres:16-alpine
    container_name: nexaros-postgres
    restart: unless-stopped
    networks:
      - nexaros-network
    environment:
      POSTGRES_DB: nexaros
      POSTGRES_USER: nexaros
      POSTGRES_PASSWORD: nexaros_dev
    ports:
      - "5433:5432"
    volumes:
      - nexaros_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexaros -d nexaros"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexaros-redis:
    image: redis:7-alpine
    container_name: nexaros-redis
    restart: unless-stopped
    networks:
      - nexaros-network
    ports:
      - "6379:6379"
    volumes:
      - nexaros_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───

  nexaros-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: nexaros-backend
    restart: unless-stopped
    networks:
      - nexaros-network
    depends_on:
      nexaros-postgres:
        condition: service_healthy
      nexaros-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nexaros:nexaros_dev@nexaros-postgres:5432/nexaros?schema=public
      JWT_SECRET: ${JWT_SECRET:-nexaros-prod-jwt-secret-change-in-production-64chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-nexaros-prod-refresh-secret-change-in-production!!}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-nexaros-admin-jwt-secret-change-in-production-64chars!!}
      PORT: 4000
      APP_URL: http://nexaros-backend:4000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://nexaros-customer:3001,http://nexaros-marketing:3002,http://nexaros-admin:3003
      REDIS_HOST: nexaros-redis
      REDIS_PORT: 6379
    ports:
      - "4000:4000"

  # ─── Customer Web ───

  nexaros-customer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.customer
      args:
        NEXT_PUBLIC_API_URL: http://nexaros-backend:4000/api
        NEXT_PUBLIC_SOCKET_URL: http://nexaros-backend:4000
    container_name: nexaros-customer
    restart: unless-stopped
    networks:
      - nexaros-network
    depends_on:
      - nexaros-backend
    environment:
      NEXT_PUBLIC_API_URL: http://nexaros-backend:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://nexaros-backend:4000
    ports:
      - "3001:3001"

  # ─── Marketing Web ───

  nexaros-marketing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.marketing
      args:
        NEXT_PUBLIC_API_URL: http://nexaros-backend:4000/api
        NEXT_PUBLIC_SITE_URL: http://nexaros-marketing:3002
    container_name: nexaros-marketing
    restart: unless-stopped
    networks:
      - nexaros-network
    depends_on:
      - nexaros-backend
    ports:
      - "3002:3002"

  # ─── Admin Portal ───

  nexaros-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    container_name: nexaros-admin
    restart: unless-stopped
    networks:
      - nexaros-network
    depends_on:
      - nexaros-backend
    environment:
      NEXT_PUBLIC_API_URL: http://nexaros-backend:4000/api
    ports:
      - "3003:3003"

volumes:
  nexaros_postgres_data:
  nexaros_redis_data:
