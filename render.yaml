services:
  - type: web
    name: nexaros-backend
    runtime: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromDatabase:
          name: nexaros-redis
          property: url
    healthCheckPath: /api/health
    autoDeploy: true

  - type: redis
    name: nexaros-redis
    plan: free
    ipAllowList: []
